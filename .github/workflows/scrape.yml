name: Scrape Facebook Posts

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Write Facebook cookies
        run: echo '${{ secrets.FB_COOKIES }}' > fb-cookies.json

      - name: Scrape and upload posts
        env:
          APP_URL: ${{ secrets.APP_URL }}
          UPLOAD_SECRET: ${{ secrets.UPLOAD_SECRET }}
          FB_COOKIES_PATH: fb-cookies.json
        run: npx tsx scripts/auto-scrape.ts
